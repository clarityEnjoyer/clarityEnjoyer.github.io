<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Street Marmot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #8b949e;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #game-container {
            position: relative;
        }

        canvas {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(13, 17, 23, 0.95);
            padding: 30px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .red-text { color: #ff3333; border-color: #ff3333 !important; box-shadow: 0 0 20px rgba(255, 51, 51, 0.2) !important;}
    </style>
</head>
<body>

    <h1>Marmot Capital Group</h1>
    <p class="subtitle">Press SPACE to jump over the Bear Markets. Protect your portfolio!</p>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        <div id="start-screen">
            <h2 id="status-text">PRESS SPACE TO TRADE</h2>
            <p id="final-score" class="hidden">Portfolio Peak: $<span id="score-val">0</span></p>
        </div>
        
        <audio id="bg-music" loop>
            <source src="melody1.mp3" type="audio/mpeg">
        </audio>
        <audio id="crash-sound">
            <source src="crash.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const statusText = document.getElementById('status-text');
        const finalScoreDisplay = document.getElementById('final-score');
        const scoreVal = document.getElementById('score-val');

        // Audio Setup
        const bgMusic = document.getElementById('bg-music');
        const crashSound = document.getElementById('crash-sound');
        bgMusic.volume = 0.4;
        crashSound.volume = 0.6;

        // Game State
        let isPlaying = false;
        let isGameOver = false;
        let score = 0;
        let frame = 0;
        let gameSpeed = 5;
        let animationId;
        let spawnCooldown = 0;

        // The Marmot (Player)
        const marmot = {
            x: 50,
            y: 200,
            width: 30,
            height: 30,
            dy: 0,
            jumpPower: -12,
            gravity: 0.6,
            grounded: false,
            
            draw() {
                ctx.font = "30px Arial";
                ctx.fillText("🐹", this.x, this.y + this.height);
            },
            
            update() {
                this.dy += this.gravity;
                this.y += this.dy;

                if (this.y + this.height >= canvas.height - 30) {
                    this.y = canvas.height - 30 - this.height;
                    this.dy = 0;
                    this.grounded = true;
                } else {
                    this.grounded = false;
                }
            },
            
            jump() {
                if (this.grounded) {
                    this.dy = this.jumpPower;
                    this.grounded = false;
                }
            }
        };

        // Obstacles (Candlesticks)
        let obstacles = [];

        class Candlestick {
            constructor() {
                this.width = 18 + Math.random() * 12;
                this.height = 20 + Math.random() * 35; 
                this.x = canvas.width;
                this.y = canvas.height - 30 - this.height;
                this.isBearish = Math.random() > 0.4; 
            }

            draw() {
                const color = this.isBearish ? '#ff3333' : '#00ff00';
                ctx.fillStyle = color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillRect(this.x + (this.width / 2) - 1, this.y - 10, 2, this.height + 20);
            }

            update() {
                this.x -= gameSpeed;
            }
        }

        function handleObstacles() {
            spawnCooldown--;

            if (spawnCooldown <= 0) {
                obstacles.push(new Candlestick());
                let speedAdjustment = (gameSpeed - 5) * 5;
                spawnCooldown = Math.max(60, 80 + Math.floor(Math.random() * 70) - speedAdjustment);
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.update();
                obs.draw();

                if (
                    marmot.x < obs.x + obs.width &&
                    marmot.x + marmot.width - 5 > obs.x && 
                    marmot.y < obs.y + obs.height &&
                    marmot.y + marmot.height - 5 > obs.y 
                ) {
                    gameOver();
                }

                if (obs.x + obs.width < 0) {
                    obstacles.shift();
                    i--;
                }
            }
        }

        function drawEnvironment() {
            ctx.strokeStyle = '#30363d';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 30);
            ctx.lineTo(canvas.width, canvas.height - 30);
            ctx.stroke();

            ctx.fillStyle = '#00ff00';
            ctx.font = "18px 'Courier New'";
            ctx.fillText(`Portfolio Returns: +$${Math.floor(score)}`, 20, 30);
        }

        function resetGame() {
            marmot.y = 200;
            marmot.dy = 0;
            obstacles = [];
            score = 0;
            frame = 0;
            gameSpeed = 5;
            spawnCooldown = 100;
            isGameOver = false;
            startScreen.classList.add('hidden');
            finalScoreDisplay.classList.add('hidden');
        }

        function gameOver() {
            isGameOver = true;
            isPlaying = false;
            
            // Audio handling on crash
            bgMusic.pause();
            crashSound.currentTime = 0;
            crashSound.play().catch(e => console.log("SFX play failed:", e));

            statusText.innerText = "MARGIN CALLED";
            startScreen.classList.add('red-text');
            scoreVal.innerText = Math.floor(score);
            finalScoreDisplay.classList.remove('hidden');
            startScreen.classList.remove('hidden');
            cancelAnimationFrame(animationId);
        }

        function gameLoop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawEnvironment();
            marmot.update();
            marmot.draw();
            handleObstacles();
            
            score += 0.5;
            frame++;
            if (frame % 600 === 0) {
                gameSpeed += 0.5; 
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // Controls
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                
                if (!isPlaying) {
                    resetGame();
                    isPlaying = true;
                    startScreen.classList.remove('red-text');
                    
                    // Audio handling on start/restart
                    crashSound.pause(); // Ensure crash sound stops if player restarts quickly
                    crashSound.currentTime = 0;
                    
                    bgMusic.currentTime = 0; // Start song from beginning
                    bgMusic.play().catch(e => console.log("BGM play failed:", e));

                    gameLoop();
                } else {
                    marmot.jump();
                }
            }
        });

        // Initialize display
        drawEnvironment();
        marmot.draw();

    </script>
</body>
</html>
